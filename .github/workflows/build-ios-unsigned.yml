name: Build iOS (unsigned)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Select latest available Xcode
        run: |
          ls /Applications | grep Xcode
          sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -n 1)"
          xcodebuild -version

      - name: Install dependencies
        run: npm ci

      - name: Prebuild native iOS project
        run: npx expo prebuild --platform ios --no-install

      - name: Install CocoaPods
        run: cd ios && pod install

      - name: Discover workspace and scheme
        id: discover
        run: |
          WORKSPACE=$(ls -d ios/*.xcworkspace | head -n 1)
          PROJECT=$(ls -d ios/*.xcodeproj | head -n 1)
          SCHEME=$(basename "$PROJECT" .xcodeproj)
          echo "All schemes in workspace:"
          xcodebuild -workspace "$WORKSPACE" -list
          echo "workspace=$WORKSPACE" >> "$GITHUB_OUTPUT"
          echo "scheme=$SCHEME" >> "$GITHUB_OUTPUT"
          echo "Workspace: $WORKSPACE / Scheme: $SCHEME"

      - name: Build (no code signing)
        run: |
          xcodebuild build \
            -workspace "${{ steps.discover.outputs.workspace }}" \
            -scheme "${{ steps.discover.outputs.scheme }}" \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Package unsigned IPA
        run: |
          echo "Build products:"
          find build/DerivedData/Build/Products -maxdepth 3
          APP_PATH=$(find build/DerivedData/Build/Products -maxdepth 3 -name "*.app" -type d | head -n 1)
          echo "Found app at: $APP_PATH"
          if [ -z "$APP_PATH" ]; then
            echo "No .app bundle found - aborting"
            exit 1
          fi
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r ShittimChest-unsigned.ipa Payload

      - uses: actions/upload-artifact@v4
        with:
          name: ShittimChest-unsigned-ipa
          path: ShittimChest-unsigned.ipa
