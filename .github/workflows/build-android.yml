name: Build Android

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Prebuild native Android project
        run: npx expo prebuild --platform android --no-install

      - name: Sign the release build with the debug keystore
        run: |
          # A debug-signed release APK is fine for sideloading outside the
          # Play Store — it just needs to embed the JS bundle instead of
          # trying to fetch it from a Metro dev server, which assembleDebug
          # doesn't do by default.
          sed -i '/release {/a\            signingConfig signingConfigs.debug' android/app/build.gradle

      - name: Raise Gradle JVM memory limits
        run: |
          # The default 512MB metaspace isn't enough for expo-updates'
          # Kotlin annotation processing (kspReleaseKotlin) in a release
          # build, which OOMs and leaves the build hanging instead of
          # failing cleanly.
          echo "org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m" >> android/gradle.properties

      - name: Build release APK
        timeout-minutes: 15
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --stacktrace --no-daemon

      - name: Locate APK
        id: locate
        run: |
          APK_PATH=$(find android/app/build/outputs/apk -name "*.apk" | head -n 1)
          echo "Found APK at: $APK_PATH"
          cp "$APK_PATH" ShittimChest.apk

      - uses: actions/upload-artifact@v4
        with:
          name: ShittimChest-apk
          path: ShittimChest.apk
