name: Publish OTA Update

on:
  workflow_dispatch:
    inputs:
      message:
        description: "Update message (shown in EAS dashboard)"
        required: false
        default: "Manual OTA update"

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Publish update
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          npx eas-cli update --channel preview --non-interactive --message "${{ inputs.message }}"
